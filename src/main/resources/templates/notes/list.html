<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Notes V1</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=4)}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">My Notes v1</a>
    <a th:href="@{/new}" class="btn btn-primary btn-sm">+ New Note v1</a>
</nav>

<div class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">Notes</h1>
            <p class="page-subtitle" th:if="${totalItems != null}"
               th:text="${totalItems + ' note' + (totalItems != 1 ? 's' : '')}"></p>
        </div>
    </div>

    <form th:action="@{/}" method="get" class="search-row">
        <div class="search-wrap">
            <span class="search-icon">&#128269;</span>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Search notes by title or content...">
        </div>
        <button type="submit" class="btn btn-secondary">Search</button>
        <a th:href="@{/}" class="btn-clear-search" th:if="${keyword != null and !keyword.isEmpty()}">Clear</a>
    </form>

    <div th:if="${notes.empty}" class="empty-state">
        <div class="empty-state-icon">&#128221;</div>
        <p class="empty-state-title" th:if="${keyword != null and !keyword.isEmpty()}">No notes match your search</p>
        <p class="empty-state-title" th:if="${keyword == null or keyword.isEmpty()}">No notes yet</p>
        <p class="empty-state-text" th:if="${keyword != null and !keyword.isEmpty()}">Try a different keyword or clear the search.</p>
        <p class="empty-state-text" th:if="${keyword == null or keyword.isEmpty()}">Create your first note to get started.</p>
        <a th:href="@{/new}" class="btn btn-primary" th:if="${keyword == null or keyword.isEmpty()}">+ New Note v1</a>
    </div>

    <div class="notes-grid" th:if="${!notes.empty}">
        <div th:each="note : ${notes}" class="note-card">
            <a th:href="@{/view/{id}(id=${note.id})}" class="note-card-link">
                <div class="note-card-top">
                    <span class="note-card-title" th:text="${note.title}">Title v1</span>
                    <span th:if="${note.category}" class="badge badge-category" th:text="${note.category.name}">Cat</span>
                </div>
                <p class="note-card-body" th:text="${note.content}">Content preview</p>
                <div class="tags-list" th:if="${note.tags != null and !note.tags.isEmpty()}">
                    <span th:each="tag : ${note.tags}" class="badge badge-tag" th:text="${tag.name}">tag v1</span>
                </div>
            </a>
            <div class="note-card-footer">
                <span class="note-card-date" th:text="${#temporals.format(note.createdAt, 'MMM d, yyyy')}">Date v1</span>
                <div class="note-card-actions">
                    <a th:href="@{/edit/{id}(id=${note.id})}" class="btn btn-ghost btn-sm">Edit</a>
                    <a th:href="@{/delete/{id}(id=${note.id})}" class="btn btn-ghost btn-sm"
                       style="color:var(--danger)"
                       onclick="return confirm('Delete this note?')">Delete</a>
                </div>
            </div>
        </div>
    </div>

    <div class="pagination" th:if="${totalPages > 1}">
        <a th:href="@{/(keyword=${keyword}, page=${currentPage - 1})}"
           th:classappend="${currentPage == 0} ? 'pg-disabled'">&laquo;</a>

        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/(keyword=${keyword}, page=${i})}"
               th:text="${i + 1}"
               th:classappend="${currentPage == i} ? 'pg-active'">1</a>
        </th:block>

        <a th:href="@{/(keyword=${keyword}, page=${currentPage + 1})}"
           th:classappend="${currentPage == totalPages - 1} ? 'pg-disabled'">&raquo;</a>
    </div>

</div>
</body>
</html>
