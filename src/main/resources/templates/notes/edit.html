<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Note</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h2>Edit Note</h2>
        <form th:action="@{/notes/update/{id}(id=${noteId})}" th:object="${noteRequest}" method="post">
            <div class="form-group">
                <label>Title:</label>
                <input type="text" th:field="*{title}" required>
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></p>
            </div>
            <div class="form-group">
                <label>Content:</label>
                <textarea th:field="*{content}" required rows="5"></textarea>
                <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="error"></p>
            </div>
            <div class="form-group">
                <label>Category:</label>
                <select th:field="*{categoryId}">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Tags (comma separated):</label>
                <input type="text" th:field="*{tags}" placeholder="e.g. work, important, personal">
            </div>
            <div class="form-actions">
                <button type="submit">Update Note</button>
                <a th:href="@{/notes}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
