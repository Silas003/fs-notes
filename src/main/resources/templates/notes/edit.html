<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Note</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=4)}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">My Notes</a>
</nav>

<div class="page-sm">

    <a th:href="@{/view/{id}(id=${noteId})}" class="back-link">&larr; Back to note</a>

    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Note</h1>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/update/{id}(id=${noteId})}" th:object="${noteRequest}" method="post">

                <div class="form-group">
                    <label class="form-label" for="title">Title</label>
                    <input id="title" type="text" class="form-control" th:field="*{title}"
                           placeholder="Give your note a title" required>
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="form-error"></p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="content">Content</label>
                    <textarea id="content" class="form-control" th:field="*{content}" rows="8"
                              placeholder="Write your note here..." required></textarea>
                    <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="form-error"></p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="categoryId">Category</label>
                    <select id="categoryId" class="form-control" th:field="*{categoryId}">
                        <option value="">No category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tags">Tags</label>
                    <input id="tags" type="text" class="form-control" th:field="*{tags}"
                           placeholder="e.g. work, important, personal">
                    <p class="form-hint">Separate tags with commas.</p>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Note</button>
                    <a th:href="@{/view/{id}(id=${noteId})}" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>
</body>
</html>
